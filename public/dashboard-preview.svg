<!-- Placeholder dashboard image - replace with actual dashboard screenshot -->
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Dashboard Header -->
  <rect x="20" y="20" width="1160" height="60" rx="8" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Nexus Dashboard</text>
  
  <!-- Sidebar -->
  <rect x="20" y="100" width="200" height="480" rx="8" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  
  <!-- Sidebar Menu Items -->
  <rect x="30" y="120" width="180" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="40" y="140" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Dashboard</text>
  
  <rect x="30" y="160" width="180" height="30" rx="4" fill="#2a2a3e" opacity="0.5"/>
  <text x="40" y="180" font-family="Arial, sans-serif" font-size="14" fill="#a1a1aa">Analytics</text>
  
  <rect x="30" y="200" width="180" height="30" rx="4" fill="#2a2a3e" opacity="0.5"/>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="14" fill="#a1a1aa">Reports</text>
  
  <!-- Main Content Area -->
  <rect x="240" y="100" width="940" height="480" rx="8" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  
  <!-- Stats Cards -->
  <rect x="260" y="120" width="200" height="100" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="280" y="150" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Total Revenue</text>
  <text x="280" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8b5cf6">$24,500</text>
  <text x="280" y="200" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">+12.5%</text>
  
  <rect x="480" y="120" width="200" height="100" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="500" y="150" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Active Users</text>
  <text x="500" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8b5cf6">1,234</text>
  <text x="500" y="200" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">+8.2%</text>
  
  <rect x="700" y="120" width="200" height="100" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="720" y="150" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Conversion</text>
  <text x="720" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8b5cf6">3.45%</text>
  <text x="720" y="200" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">+2.1%</text>
  
  <rect x="920" y="120" width="240" height="100" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="940" y="150" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Avg. Session</text>
  <text x="940" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8b5cf6">4m 32s</text>
  <text x="940" y="200" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">+18s</text>
  
  <!-- Chart Area -->
  <rect x="260" y="240" width="640" height="320" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="280" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Revenue Overview</text>
  
  <!-- Simple Line Chart -->
  <polyline points="300,500 380,480 460,450 540,460 620,420 700,400 780,380 860,360" 
            fill="none" stroke="#8b5cf6" stroke-width="3" filter="url(#glow)"/>
  <polyline points="300,500 380,480 460,450 540,460 620,420 700,400 780,380 860,360 860,520 300,520" 
            fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Activity Feed -->
  <rect x="920" y="240" width="240" height="320" rx="8" fill="#2a2a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <text x="940" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Recent Activity</text>
  
  <!-- Activity Items -->
  <circle cx="940" cy="300" r="4" fill="#8b5cf6"/>
  <text x="950" y="305" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">New user registered</text>
  
  <circle cx="940" cy="330" r="4" fill="#22c55e"/>
  <text x="950" y="335" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Payment received</text>
  
  <circle cx="940" cy="360" r="4" fill="#f59e0b"/>
  <text x="950" y="365" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">Server update</text>
  
  <circle cx="940" cy="390" r="4" fill="#8b5cf6"/>
  <text x="950" y="395" font-family="Arial, sans-serif" font-size="12" fill="#a1a1aa">New feature deployed</text>
</svg>
